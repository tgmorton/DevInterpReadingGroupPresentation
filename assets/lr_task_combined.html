<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Source Sans 3',sans-serif;background:#fff;color:#3a3a3a}
#app{display:flex;flex-direction:column;width:100%;height:100%;padding:8px 14px 6px}

.top-ctrl{display:flex;gap:8px;align-items:center;margin:0 0 6px;flex-wrap:wrap}
.top-ctrl button{font-size:14px;padding:5px 14px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-family:inherit}
.step-nav{display:flex;gap:4px;align-items:center}
.step-label{font-size:15px;font-weight:500;color:#1a1a1a;min-width:200px;text-align:center}
.task-info{font-size:13px;color:#7a7a7a;font-family:'Source Code Pro',monospace;padding:4px 10px;border-radius:4px;background:#f6f6f4}

.grid-wrap{overflow-x:auto;margin:0 0 6px;border:1px solid #e0e0e0;border-radius:6px;padding:6px 8px}
.grid{display:flex;gap:0;align-items:stretch}
.grid-col{display:flex;flex-direction:column;gap:0;min-width:48px}
.grid-col.dim-labels{min-width:38px}
.grid-col.dim-labels .gc{justify-content:flex-end;padding-right:4px;border:none;background:none;font-size:11px;color:#7a7a7a}
.gc{height:22px;display:flex;align-items:center;justify-content:center;font-family:'Source Code Pro',monospace;font-size:11px;border:0.5px solid #e0e0e0;min-width:52px;padding:0 3px}
.gc:first-child{border-radius:3px 3px 0 0}
.gc:last-child{border-radius:0 0 3px 3px}
.gc.hdr{font-weight:500;font-size:11px;height:24px;border:none;background:none;color:#7a7a7a}
.gc.x{background:#E6F1FB;color:#0C447C}
.gc.y{background:#EEEDFE;color:#3C3489}
.gc.z{background:#f6f6f4;color:#a8a8a8}
.gc.hidden{opacity:0.12}
.gc.query{background:#FAEEDA;color:#854F0B;font-weight:500}
.gc.target{background:#FAECE7;color:#712B13;font-weight:500;border:1.5px dashed #D85A30}

.main-row{display:flex;gap:8px;flex:1;min-height:0;overflow:hidden}
.panel{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.panel-label{font-size:11px;font-weight:600;color:#1a1a1a;margin:0 0 2px;flex-shrink:0}
.panel canvas{flex:1;width:100%;min-height:0;border-radius:6px;background:#f6f6f4;display:block}

.total-box{display:flex;align-items:center;gap:10px;padding:5px 10px;border-radius:6px;background:#f6f6f4;margin:4px 0 0;font-size:13px;color:#7a7a7a}
.total-box .val{font-size:16px;font-weight:500;font-family:'Source Code Pro',monospace;color:#1a1a1a}
</style>
</head>
<body>
<div id="app">

<div class="top-ctrl">
  <button onclick="resample()">New task</button>
  <div class="step-nav">
    <button onclick="prev()">←</button>
    <div class="step-label" id="step-label">Predicting y₁</div>
    <button onclick="next()">→</button>
  </div>
  <div class="task-info" id="task-info"></div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="main-row">
  <div class="panel">
    <div class="panel-label" id="ctx-label">Context at position k=1</div>
    <canvas id="cvCtx"></canvas>
  </div>
  <div class="panel">
    <div class="panel-label">Per-position loss</div>
    <canvas id="cvLoss"></canvas>
  </div>
</div>

<div class="total-box">
  <span>Mean loss:</span>
  <span class="val" id="total-loss">—</span>
  <span style="font-size:10px;color:#a8a8a8">= (1/K) Σ (ŷₖ − yₖ)²</span>
</div>

</div>

<script>
const txt='#3a3a3a',txt2='#7a7a7a',gridC='rgba(0,0,0,0.06)';
const D=4, K=8, sigma2=0.125;
let task,xs,ys,preds,losses,step=0;

function randn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

function solveRidge(Xs,Ys,lam){
  const n=Xs.length,d=Xs[0].length;
  let XtX=Array(d).fill(0).map(()=>Array(d).fill(0));
  let Xty=Array(d).fill(0);
  for(let i=0;i<n;i++){for(let a=0;a<d;a++){Xty[a]+=Xs[i][a]*Ys[i];for(let b=0;b<d;b++)XtX[a][b]+=Xs[i][a]*Xs[i][b];}}
  for(let a=0;a<d;a++)XtX[a][a]+=lam;
  const aug=XtX.map((r,i)=>[...r,Xty[i]]);
  for(let i=0;i<d;i++){let mx=i;for(let j=i+1;j<d;j++)if(Math.abs(aug[j][i])>Math.abs(aug[mx][i]))mx=j;[aug[i],aug[mx]]=[aug[mx],aug[i]];if(Math.abs(aug[i][i])<1e-10)return null;for(let j=i+1;j<d;j++){const f=aug[j][i]/aug[i][i];for(let k=i;k<=d;k++)aug[j][k]-=f*aug[i][k];}}
  const x=Array(d).fill(0);for(let i=d-1;i>=0;i--){x[i]=aug[i][d];for(let j=i+1;j<d;j++)x[i]-=aug[i][j]*x[j];x[i]/=aug[i][i];}
  return x;
}

function resample(){
  task=[];for(let i=0;i<D;i++)task.push(randn());
  xs=[];ys=[];preds=[];losses=[];
  for(let k=0;k<K;k++){
    const x=[];for(let i=0;i<D;i++)x.push(randn());
    xs.push(x);
    ys.push(task.reduce((s,ti,i)=>s+ti*x[i],0)+randn()*Math.sqrt(sigma2));
  }
  for(let k=0;k<K;k++){
    if(k===0){preds.push(0);}
    else{
      const tHat=solveRidge(xs.slice(0,k),ys.slice(0,k),0.3);
      if(tHat) preds.push(tHat.reduce((s,ti,i)=>s+ti*xs[k][i],0));
      else preds.push(0);
    }
    losses.push((preds[k]-ys[k])**2);
  }
  document.getElementById('task-info').textContent='t = ['+task.map(v=>v.toFixed(2)).join(', ')+'] (hidden)';
  step=0; buildGrid(); render();
}

function prev(){if(step>0){step--;buildGrid();render();}}
function next(){if(step<K-1){step++;buildGrid();render();}}

function buildGrid(){
  document.getElementById('step-label').textContent=`Predicting y${step+1} (${step} ctx pairs)`;
  const visibleUpTo=2*step;
  let html='<div class="grid-col dim-labels"><div class="gc hdr"></div>';
  for(let d=0;d<5;d++) html+=`<div class="gc">d${d}</div>`;
  html+='</div>';

  for(let tok=0;tok<2*K;tok++){
    const isX=tok%2===0, k=Math.floor(tok/2);
    const visible=tok<=visibleUpTo;
    const isQuery=tok===visibleUpTo&&isX;
    const isTarget=tok===visibleUpTo+1&&!isX;

    html+='<div class="grid-col">';
    const label=isX?'x'+(k+1):'y'+(k+1);
    const hdrStyle=isQuery?'color:#854F0B;font-weight:600':(isTarget?'color:#D85A30;font-weight:600':'');
    html+=`<div class="gc hdr" style="${hdrStyle}">${isQuery?'→ ':''}${isTarget?'→ ':''}${label}</div>`;

    for(let d=0;d<5;d++){
      let val,cls;
      if(isX){
        if(d===0){val='0';cls=visible?'z':'z hidden';}
        else{val=xs[k][d-1].toFixed(1);cls=visible?(isQuery?'query':'x'):'x hidden';}
      } else {
        if(d===0){val=ys[k].toFixed(2);cls=visible?'y':(isTarget?'target':'y hidden');}
        else{val='0';cls=visible?'z':'z hidden';}
      }
      html+=`<div class="gc ${cls}">${val}</div>`;
    }
    html+='</div>';
  }
  document.getElementById('grid').innerHTML=html;
}

function sc(id){
  const cv=document.getElementById(id),dpr=window.devicePixelRatio||1;
  const rect=cv.getBoundingClientRect();
  const w=Math.floor(rect.width),h=Math.floor(rect.height);
  if(w<10||h<10)return{ctx:cv.getContext('2d'),w:300,h:200};
  cv.width=w*dpr;cv.height=h*dpr;
  const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  return{ctx,w,h};
}

function render(){
  document.getElementById('ctx-label').textContent=`x${step+1}: ${step} visible (x,y) pairs`;

  // Context scatter
  const{ctx:c1,w:w1,h:h1}=sc('cvCtx');
  const p={l:32,r:10,t:10,b:20};
  const pw=w1-p.l-p.r,ph=h1-p.t-p.b;
  const allDot=xs.map(x=>x[0]),allY=ys;
  const xr=Math.max(...allDot.map(Math.abs),0.5)*1.3;
  const yr=Math.max(...allY.map(Math.abs),0.5)*1.3;
  function tx(v){return p.l+(v/xr*0.5+0.5)*pw;}
  function ty(v){return p.t+ph-(v/yr*0.5+0.5)*ph;}

  c1.strokeStyle=gridC;c1.lineWidth=0.5;
  c1.beginPath();c1.moveTo(p.l,p.t);c1.lineTo(p.l,p.t+ph);c1.lineTo(p.l+pw,p.t+ph);c1.stroke();
  c1.setLineDash([3,3]);c1.beginPath();c1.moveTo(p.l,ty(0));c1.lineTo(p.l+pw,ty(0));c1.stroke();
  c1.beginPath();c1.moveTo(tx(0),p.t);c1.lineTo(tx(0),p.t+ph);c1.stroke();c1.setLineDash([]);

  // True line
  c1.strokeStyle='#D85A30';c1.lineWidth=1;c1.globalAlpha=0.25;c1.setLineDash([4,3]);
  c1.beginPath();c1.moveTo(tx(-xr),ty(-xr*task[0]));c1.lineTo(tx(xr),ty(xr*task[0]));c1.stroke();
  c1.setLineDash([]);c1.globalAlpha=1;

  // Visible context
  for(let k=0;k<step;k++){
    c1.fillStyle='#378ADD';c1.beginPath();c1.arc(tx(xs[k][0]),ty(ys[k]),4,0,Math.PI*2);c1.fill();
    c1.fillStyle=txt2;c1.font="500 9px 'Source Code Pro'";c1.textAlign='center';
    c1.fillText(k+1,tx(xs[k][0])+7,ty(ys[k])-5);
  }

  // Query + prediction
  const qx=tx(xs[step][0]),qyt=ty(ys[step]),qyp=ty(preds[step]);
  c1.strokeStyle='#D85A30';c1.lineWidth=1.5;c1.setLineDash([3,3]);
  c1.beginPath();c1.moveTo(qx,qyp);c1.lineTo(qx,qyt);c1.stroke();c1.setLineDash([]);
  c1.strokeStyle='#D85A30';c1.lineWidth=2;c1.beginPath();c1.arc(qx,qyt,5,0,Math.PI*2);c1.stroke();
  c1.fillStyle='#D85A30';c1.beginPath();c1.arc(qx,qyp,4,0,Math.PI*2);c1.fill();

  c1.font="10px 'Source Sans 3'";c1.textAlign='left';
  c1.fillStyle='#378ADD';c1.fillText('context pairs',p.l+4,p.t+10);
  c1.fillStyle='#D85A30';c1.fillText('pred (●) vs true (○)',p.l+4,p.t+22);

  // Loss bars
  const{ctx:c2,w:w2,h:h2}=sc('cvLoss');
  const p2={l:32,r:10,t:10,b:20};
  const pw2=w2-p2.l-p2.r,ph2=h2-p2.t-p2.b;
  c2.strokeStyle=gridC;c2.lineWidth=0.5;
  c2.beginPath();c2.moveTo(p2.l,p2.t);c2.lineTo(p2.l,p2.t+ph2);c2.lineTo(p2.l+pw2,p2.t+ph2);c2.stroke();

  const maxL=Math.max(...losses,0.5)*1.1;
  const gap=pw2/K,barW=gap*0.6;

  for(let k=0;k<K;k++){
    const bx=p2.l+k*gap+(gap-barW)/2;
    const bh=(losses[k]/maxL)*ph2*0.85;
    const sel=k===step;
    c2.fillStyle=sel?'#D85A30':'#c4933f';c2.globalAlpha=sel?1:0.4;
    c2.fillRect(bx,p2.t+ph2-bh,barW,bh);c2.globalAlpha=1;
    c2.fillStyle=sel?'#D85A30':txt2;c2.font=`${sel?'500':'400'} 10px 'Source Code Pro'`;c2.textAlign='center';
    c2.fillText(losses[k].toFixed(2),bx+barW/2,p2.t+ph2-bh-4);
    c2.fillStyle=txt2;c2.font="9px 'Source Code Pro'";
    c2.fillText('k='+(k+1),bx+barW/2,p2.t+ph2+12);
  }

  const meanL=losses.reduce((a,b)=>a+b,0)/K;
  const meanY=p2.t+ph2-(meanL/maxL)*ph2*0.85;
  c2.strokeStyle='#1D9E75';c2.lineWidth=1.5;c2.setLineDash([4,3]);
  c2.beginPath();c2.moveTo(p2.l,meanY);c2.lineTo(p2.l+pw2,meanY);c2.stroke();c2.setLineDash([]);
  c2.fillStyle='#1D9E75';c2.font="500 10px 'Source Sans 3'";c2.textAlign='left';
  c2.fillText('mean',p2.l+4,meanY-4);

  document.getElementById('total-loss').textContent=meanL.toFixed(4);
}

resample();
window.addEventListener('resize',()=>{buildGrid();render();});
</script>
</body></html>
