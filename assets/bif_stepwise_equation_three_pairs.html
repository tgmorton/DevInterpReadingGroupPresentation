<style>
.w{padding:0.5rem 0}
canvas{width:100%;border-radius:var(--border-radius-lg);display:block;border:0.5px solid var(--color-border-tertiary)}
.sr{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px;color:var(--color-text-secondary)}
.sr label{min-width:50px}
.sr span{font-weight:500;font-family:var(--font-mono);min-width:60px;text-align:right}
.phase{font-size:13px;font-weight:500;color:var(--color-text-primary);margin:4px 0 4px;text-align:center}
.ctrls{display:flex;gap:8px;margin:4px 0;flex-wrap:wrap;align-items:center}
.ctrls button{font-size:12px;padding:5px 14px}
.pair-btns{display:flex;gap:3px}
.pair-btns button{font-size:12px;padding:4px 12px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary)}
.pair-btns button.on{background:var(--color-text-primary);color:var(--color-background-primary)}
.eqbox{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px 16px;margin:6px 0;font-family:var(--font-mono);font-size:13px;line-height:1.9}
.step{margin:0 0 8px;padding:0 0 8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.step:last-child{border-bottom:none;margin:0;padding:0}
.slabel{font-size:11px;color:var(--color-text-secondary);font-family:var(--font-sans);margin:0 0 2px;font-weight:500}
.v{font-weight:500;padding:1px 5px;border-radius:3px;font-size:14px}
.tl{color:#085041;background:#E1F5EE}
.cr{color:#712B13;background:#FAECE7}
.pr{color:#3C3489;background:#EEEDFE}
.gr{color:#444441;background:#F1EFE8}
.am{color:#633806;background:#FAEEDA}
.op{color:var(--color-text-tertiary)}
.final{font-size:15px;font-weight:500}
.note{font-size:12px;color:var(--color-text-secondary);margin:4px 0;text-align:center;min-height:36px;line-height:1.6}
</style>
<div class="w">
<div class="ctrls">
  <span style="font-size:12px;color:var(--color-text-secondary)">BIF of dog on:</span>
  <div class="pair-btns" id="pairBtns"></div>
</div>
<canvas id="cv" style="height:200px"></canvas>
<div class="sr">
  <label>Epoch</label>
  <input type="range" min="0" max="1000" value="180" step="1" id="epoch" style="flex:1" oninput="upd()">
  <span id="oEp">2,160</span>
</div>
<div class="phase" id="phase"></div>
<div class="ctrls">
  <button onclick="play()">Play</button>
  <button onclick="stop()">Pause</button>
  <button onclick="document.getElementById('epoch').value=0;upd()">Reset</button>
</div>
<div class="eqbox" id="eq"></div>
<div class="note" id="note"></div>
</div>
<script>
const NSAMP=300,NOISE=0.022;
let _s=42;
function rn(){_s=(_s*1664525+1013904223)&0x7FFFFFFF;return _s/0x7FFFFFFF;}
function rg(){let u=0,v=0;while(!u)u=rn();while(!v)v=rn();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

const pairs=[
  {name:'cat',col:'#D85A30'},
  {name:'penguin',col:'#1D9E75'},
  {name:'lily',col:'#ED93B1'},
];
let selPair=0;

const stages={
  cat:[
    {t:0,uD:0.35,uQ:0.35,vD:0.35,vQ:0.35,piU:1.0,lab:'Before training',note:'One basin. All terms near zero.'},
    {t:80,uD:0.34,uQ:0.34,vD:0.34,vQ:0.34,piU:1.0,lab:'Mode 1: all living',note:'Still one basin.'},
    {t:180,uD:0.30,uQ:0.30,vD:0.18,vQ:0.18,piU:0.5,lab:'Transition: animal vs plant',note:'Two basins. Both \u0394s positive (both losses drop in V). Product positive \u2192 between-phase positive \u2192 BIF negative.'},
    {t:280,uD:0.18,uQ:0.18,vD:0.18,vQ:0.18,piU:1.0,lab:'Consolidated: animal learned',note:'\u03C0U\u00B7\u03C0V = 0. Between-phase is zero. Within-phase tiny. BIF \u2248 0.'},
    {t:400,uD:0.17,uQ:0.17,vD:0.10,vQ:0.10,piU:0.5,lab:'Transition: mammal vs bird',note:'Both \u0394s positive again. Same pattern. BIF negative.'},
    {t:500,uD:0.10,uQ:0.10,vD:0.10,vQ:0.10,piU:1.0,lab:'Consolidated: mammal learned',note:'\u03C0U\u00B7\u03C0V = 0. BIF \u2248 0.'},
    {t:620,uD:0.09,uQ:0.09,vD:0.09,vQ:0.09,piU:1.0,lab:'Before final distinction',note:'Quiet.'},
    {t:720,uD:0.08,uQ:0.08,vD:0.03,vQ:0.20,piU:0.5,lab:'Transition: dog vs cat',note:'\u0394dog positive, \u0394cat NEGATIVE. Product flips. BIF is now POSITIVE.'},
    {t:830,uD:0.06,uQ:0.10,vD:0.02,vQ:0.18,piU:0.3,lab:'Transition resolving',note:'\u03C0U shrinking, between-phase fading.'},
    {t:920,uD:0.03,uQ:0.07,vD:0.03,vQ:0.07,piU:1.0,lab:'Differentiated',note:'One basin. Independent. BIF \u2248 0.'},
    {t:1000,uD:0.02,uQ:0.04,vD:0.02,vQ:0.04,piU:1.0,lab:'Converged',note:'Done.'},
  ],
  penguin:[
    {t:0,uD:0.35,uQ:0.35,vD:0.35,vQ:0.35,piU:1.0,lab:'Before training',note:'One basin.'},
    {t:80,uD:0.34,uQ:0.34,vD:0.34,vQ:0.34,piU:1.0,lab:'Mode 1: all living',note:'Still one basin.'},
    {t:180,uD:0.30,uQ:0.30,vD:0.18,vQ:0.19,piU:0.5,lab:'Transition: animal vs plant',note:'Both animals. Both \u0394s positive. BIF negative.'},
    {t:280,uD:0.18,uQ:0.19,vD:0.18,vQ:0.19,piU:1.0,lab:'Consolidated: animal learned',note:'\u03C0U\u00B7\u03C0V = 0. BIF \u2248 0.'},
    {t:400,uD:0.17,uQ:0.17,vD:0.08,vQ:0.26,piU:0.5,lab:'Transition: mammal vs bird',note:'\u0394dog positive (mammal features help dog), \u0394penguin NEGATIVE (mammal features hurt a bird). Product flips. BIF POSITIVE.'},
    {t:520,uD:0.09,uQ:0.18,vD:0.09,vQ:0.18,piU:1.0,lab:'Consolidated: mammal/bird split',note:'Resolved. One basin. BIF \u2248 0.'},
    {t:700,uD:0.06,uQ:0.10,vD:0.06,vQ:0.10,piU:1.0,lab:'Dog/cat transition (irrelevant)',note:'This transition doesn\u2019t involve penguin. One basin for this pair.'},
    {t:920,uD:0.03,uQ:0.06,vD:0.03,vQ:0.06,piU:1.0,lab:'Converged',note:'Independent. BIF \u2248 0.'},
    {t:1000,uD:0.02,uQ:0.05,vD:0.02,vQ:0.05,piU:1.0,lab:'Done',note:''},
  ],
  lily:[
    {t:0,uD:0.35,uQ:0.35,vD:0.35,vQ:0.35,piU:1.0,lab:'Before training',note:'One basin.'},
    {t:80,uD:0.34,uQ:0.34,vD:0.34,vQ:0.34,piU:1.0,lab:'Mode 1: all living',note:'Still one basin.'},
    {t:180,uD:0.28,uQ:0.28,vD:0.15,vQ:0.38,piU:0.5,lab:'Transition: animal vs plant',note:'\u0394dog positive (animal features help), \u0394lily NEGATIVE (animal features pull away from plant). Product negative. BIF POSITIVE.'},
    {t:300,uD:0.16,uQ:0.22,vD:0.16,vQ:0.22,piU:1.0,lab:'Consolidated: animal/plant split',note:'Resolved. Lily and dog are now in separate branches. One basin.'},
    {t:500,uD:0.10,uQ:0.12,vD:0.10,vQ:0.12,piU:1.0,lab:'Mammal/bird (irrelevant to lily)',note:'This transition is within animals. Doesn\u2019t involve lily.'},
    {t:750,uD:0.06,uQ:0.08,vD:0.06,vQ:0.08,piU:1.0,lab:'Dog/cat (irrelevant to lily)',note:'Also within animals. Lily is long resolved.'},
    {t:1000,uD:0.02,uQ:0.04,vD:0.02,vQ:0.04,piU:1.0,lab:'Converged',note:''},
  ],
};

function lerp(a,b,f){return a+(b-a)*f;}
function getState(t){
  const kf=stages[pairs[selPair].name];
  if(t<=kf[0].t)return kf[0];if(t>=kf[kf.length-1].t)return kf[kf.length-1];
  for(let i=0;i<kf.length-1;i++){if(t>=kf[i].t&&t<=kf[i+1].t){const f=(t-kf[i].t)/(kf[i+1].t-kf[i].t),sf=f*f*(3-2*f),a=kf[i],b=kf[i+1];return{uD:lerp(a.uD,b.uD,sf),uQ:lerp(a.uQ,b.uQ,sf),vD:lerp(a.vD,b.vD,sf),vQ:lerp(a.vQ,b.vQ,sf),piU:lerp(a.piU,b.piU,sf),lab:sf<0.5?a.lab:b.lab,note:sf<0.5?a.note:b.note};}}
}

let animId=null;
function play(){if(animId)return;function loop(){const sl=document.getElementById('epoch');let v=parseInt(sl.value)+2;if(v>1000){v=1000;stop();}sl.value=v;upd();animId=requestAnimationFrame(loop);}animId=requestAnimationFrame(loop);}
function stop(){if(animId){cancelAnimationFrame(animId);animId=null;}}
function f4(v){return v.toFixed(4);}
function f3(v){return v.toFixed(3);}
function fs(v){return(v>=0?'+':'\u2212')+Math.abs(v).toFixed(3);}
function fs4(v){return(v>=0?'+':'\u2212')+Math.abs(v).toFixed(4);}

function upd(){
  const t=parseInt(document.getElementById('epoch').value);
  document.getElementById('oEp').textContent=Math.round(t/1000*12000).toLocaleString();
  const s=getState(t);
  const qn=pairs[selPair].name;
  document.getElementById('phase').textContent=s.lab;
  document.getElementById('note').textContent=s.note;
  _s=42;
  const pts=[];
  for(let i=0;i<NSAMP;i++){const inU=rn()<s.piU;pts.push({d:(inU?s.uD:s.vD)+rg()*NOISE,q:(inU?s.uQ:s.vQ)+rg()*NOISE,phase:inU?0:1});}
  const nU=pts.filter(p=>p.phase===0).length,nV=NSAMP-nU;
  const piU=nU/NSAMP,piV=nV/NSAMP;
  let mdU=0,mqU=0,mdV=0,mqV=0;
  pts.forEach(p=>{if(p.phase===0){mdU+=p.d;mqU+=p.q;}else{mdV+=p.d;mqV+=p.q;}});
  if(nU>0){mdU/=nU;mqU/=nU;}if(nV>0){mdV/=nV;mqV/=nV;}
  let covU=0,covV=0;
  pts.forEach(p=>{if(p.phase===0)covU+=(p.d-mdU)*(p.q-mqU);else covV+=(p.d-mdV)*(p.q-mqV);});
  if(nU>1)covU/=(nU-1);if(nV>1)covV/=(nV-1);
  const dD=mdU-mdV,dQ=mqU-mqV;
  const within=piU*covU+piV*covV;
  const between=piU*piV*dD*dQ;
  const total=within+between;
  const bif=-total;

  let h='';
  h+='<div class="step"><div class="slabel">1. Posterior split</div>';
  h+='\u03C0<sub>U</sub> = <span class="v gr">'+f3(piU)+'</span> &nbsp; \u03C0<sub>V</sub> = <span class="v gr">'+f3(piV)+'</span> &nbsp;\u2192&nbsp; \u03C0<sub>U</sub>\u00B7\u03C0<sub>V</sub> = <span class="v gr">'+f3(piU*piV)+'</span></div>';

  h+='<div class="step"><div class="slabel">2. Within-phase covariance</div>';
  h+='<span class="v gr">'+f3(piU)+'</span><span class="op"> \u00B7 </span><span class="v tl">'+f4(covU)+'</span><span class="op"> + </span><span class="v gr">'+f3(piV)+'</span><span class="op"> \u00B7 </span><span class="v tl">'+f4(nV>1?covV:0)+'</span><span class="op"> = </span><span class="v tl">'+fs4(within)+'</span></div>';

  h+='<div class="step"><div class="slabel">3. Between-phase: mean shifts across basins</div>';
  h+='\u0394dog = <span class="v am">'+fs(dD)+'</span> &nbsp; \u0394'+qn+' = <span class="v am">'+fs(dQ)+'</span> &nbsp;\u2192&nbsp; product = <span class="v am">'+fs4(dD*dQ)+'</span><br>';
  h+='<span class="v gr">'+f3(piU*piV)+'</span><span class="op"> \u00B7 </span><span class="v am">'+fs4(dD*dQ)+'</span><span class="op"> = </span><span class="v cr">'+fs4(between)+'</span></div>';

  h+='<div class="step"><div class="slabel">4. Total covariance = within + between</div>';
  h+='Cov(\u2113<sub>dog</sub>, \u2113<sub>'+qn+'</sub>) = <span class="v tl">'+fs4(within)+'</span><span class="op"> + </span><span class="v cr">'+fs4(between)+'</span><span class="op"> = </span><span class="v gr">'+fs4(total)+'</span></div>';

  h+='<div class="step"><div class="slabel">5. BIF = negate</div>';
  h+='<span class="final">BIF(dog, '+qn+') = \u2212(<span class="v gr">'+fs4(total)+'</span>) = <span class="v pr">'+fs4(bif)+'</span></span></div>';

  document.getElementById('eq').innerHTML=h;

  const cv=document.getElementById('cv');
  const dpr=window.devicePixelRatio||1;
  const rect=cv.getBoundingClientRect();
  const w=rect.width,hh=rect.height;
  cv.width=w*dpr;cv.height=hh*dpr;
  const c=cv.getContext('2d');c.setTransform(dpr,0,0,dpr,0,0);
  const cs=getComputedStyle(document.documentElement);
  const gridC=cs.getPropertyValue('--color-border-tertiary').trim();
  const txtC=cs.getPropertyValue('--color-text-secondary').trim();
  const white=cs.getPropertyValue('--color-background-primary').trim();
  c.fillStyle=white;c.fillRect(0,0,w,hh);
  const pad={l:40,r:10,t:10,b:24},pw=w-pad.l-pad.r,ph=hh-pad.t-pad.b;
  const axMin=-0.02,axMax=0.48;
  function tx(v){return pad.l+((v-axMin)/(axMax-axMin))*pw;}
  function ty(v){return pad.t+ph-((v-axMin)/(axMax-axMin))*ph;}
  c.strokeStyle=gridC;c.lineWidth=0.5;
  c.beginPath();c.moveTo(pad.l,pad.t);c.lineTo(pad.l,pad.t+ph);c.lineTo(pad.l+pw,pad.t+ph);c.stroke();
  c.setLineDash([3,3]);c.beginPath();c.moveTo(tx(0),ty(0));c.lineTo(tx(axMax),ty(axMax));c.stroke();c.setLineDash([]);
  c.fillStyle=txtC;c.font='11px sans-serif';c.textAlign='center';c.fillText('\u2113 dog',pad.l+pw/2,hh-2);
  c.save();c.translate(12,pad.t+ph/2);c.rotate(-Math.PI/2);c.textAlign='center';c.fillText('\u2113 '+qn,0,0);c.restore();
  pts.forEach(p=>{c.fillStyle=p.phase===0?'rgba(29,158,117,0.3)':'rgba(216,90,48,0.3)';c.beginPath();c.arc(tx(p.d),ty(p.q),3,0,Math.PI*2);c.fill();});
  if(nU>0&&nV>0&&s.piU>0.02&&s.piU<0.98){
    c.setLineDash([5,4]);c.strokeStyle='#534AB7';c.lineWidth=2;
    c.beginPath();c.moveTo(tx(mdU),ty(mqU));c.lineTo(tx(mdV),ty(mqV));c.stroke();c.setLineDash([]);
    c.strokeStyle=white;c.lineWidth=2;
    c.fillStyle='#085041';c.beginPath();c.arc(tx(mdU),ty(mqU),7,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#712B13';c.beginPath();c.arc(tx(mdV),ty(mqV),7,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle=white;c.font='500 9px sans-serif';c.textAlign='center';
    c.fillText('U',tx(mdU),ty(mqU)+3);c.fillText('V',tx(mdV),ty(mqV)+3);
  }
}

const pairEl=document.getElementById('pairBtns');
pairs.forEach((p,i)=>{
  const b=document.createElement('button');b.textContent=p.name;
  if(i===0)b.classList.add('on');
  b.onclick=()=>{selPair=i;pairEl.querySelectorAll('button').forEach((bb,bi)=>bb.classList.toggle('on',bi===i));upd();};
  pairEl.appendChild(b);
});

upd();
window.addEventListener('resize',upd);
</script>
