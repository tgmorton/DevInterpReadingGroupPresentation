<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Source Sans 3',sans-serif;background:#fff;color:#3a3a3a}
#app{display:flex;flex-direction:column;width:100%;height:100%;padding:14px 20px}

.ctrl{display:flex;align-items:center;gap:10px;margin:0 0 8px}
.ctrl label{font-size:14px;color:#7a7a7a;min-width:70px}
.ctrl select{font-family:inherit;font-size:13px;padding:4px 8px;border:1px solid #ddd;border-radius:4px}

.col{display:flex;gap:10px;flex:1;min-height:0}
.panel{background:#f6f6f4;border-radius:6px;padding:8px 12px;overflow:hidden}
.panel h3{font-size:14px;font-weight:600;margin:0 0 5px;color:#1a1a1a}
.val{font-family:'Source Code Pro',monospace;font-size:13px;line-height:1.7}
.pos{color:#1D9E75}.neg{color:#E24B4A}.zero{color:#a8a8a8}
.err{background:#FCEBEB;border-radius:3px;padding:0 3px}
.perfect{background:#E1F5EE;border-radius:3px;padding:0 3px}

.feat-btn{border:1px solid #ddd;background:#fff;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:13px;font-family:inherit;color:#3a3a3a}
.feat-btn.active{background:#2d5a7b;border-color:#2d5a7b;color:#fff}

.top-row{display:flex;gap:10px;margin-bottom:8px}
.top-row .panel{flex:1;min-width:0}
.bottom-row{display:flex;gap:10px;flex:1;min-height:0}
.bottom-row .panel{overflow:hidden}

#vec-svg{display:block;width:100%;height:100%}
</style>
</head>
<body>
<div id="app">
  <div class="ctrl">
    <label>Feature</label>
    <div id="feat-btns"></div>
    <label style="margin-left:12px">μ</label>
    <input type="range" min="0" max="100" value="70" id="mu-slider" style="width:100px" step="1">
    <span id="mu-val" style="font-size:12px;font-weight:500;min-width:28px">0.70</span>
    <label style="margin-left:12px">Config</label>
    <select id="config-sel">
      <option value="4">4-gon (square)</option>
      <option value="5">5-gon (pentagon)</option>
      <option value="6" selected>6-gon (hexagon)</option>
    </select>
  </div>

  <div class="top-row">
    <div class="panel"><h3>Input x</h3><div class="val" id="v-input"></div></div>
    <div class="panel"><h3>Encoded Wx (2D)</h3><div class="val" id="v-enc"></div></div>
    <div class="panel"><h3>Decoded WᵀWx + b</h3><div class="val" id="v-dec"></div></div>
    <div class="panel"><h3>Output ReLU(...)</h3><div class="val" id="v-out"></div></div>
  </div>

  <div class="bottom-row">
    <div class="panel" style="flex:2;display:flex;flex-direction:column">
      <h3>Weight columns in 2D</h3>
      <svg id="vec-svg" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="panel" style="flex:1">
      <h3>Reconstruction error</h3>
      <div class="val" id="v-err"></div>
      <div style="margin-top:6px;font-size:11px;color:#7a7a7a;line-height:1.5" id="v-explain"></div>
    </div>
  </div>
</div>

<script>
const C = 6;
const configs = {
  4: {k:4, l:1.0, b:0, angles:[0, Math.PI/2, Math.PI, 3*Math.PI/2]},
  5: {k:5, l:1.17046, b:-0.28230, angles:[0,1,2,3,4].map(i=>i*2*Math.PI/5)},
  6: {k:6, l:1.32053, b:-0.61814, angles:[0,1,2,3,4,5].map(i=>i*2*Math.PI/6)}
};

let activeFeature = 0, mu = 0.7, config = '6';

function getW(cfg) {
  const c = configs[cfg], W = [];
  for (let i = 0; i < C; i++) W.push(i < c.k ? [c.l*Math.cos(c.angles[i]), c.l*Math.sin(c.angles[i])] : [0,0]);
  return W;
}
function getB(cfg) {
  const c = configs[cfg], b = [];
  for (let i = 0; i < C; i++) b.push(i < c.k ? c.b : -0.5);
  return b;
}
function fmt(v) {
  const s = v.toFixed(3);
  if (Math.abs(v) < 0.0005) return '<span class="zero">0.000</span>';
  return v > 0 ? '<span class="pos">'+s+'</span>' : '<span class="neg">'+s+'</span>';
}

function update() {
  const W = getW(config), b = getB(config);
  const x = Array(C).fill(0); x[activeFeature] = mu;
  const enc = [0,0];
  for (let i=0;i<C;i++){enc[0]+=W[i][0]*x[i];enc[1]+=W[i][1]*x[i];}
  const dec = Array(C).fill(0);
  for (let i=0;i<C;i++) dec[i]=W[i][0]*enc[0]+W[i][1]*enc[1]+b[i];
  const out = dec.map(v=>Math.max(0,v));
  const errs = x.map((xi,i)=>(xi-out[i])*(xi-out[i]));
  const totalErr = errs.reduce((a,b)=>a+b,0);

  document.getElementById('v-input').innerHTML = x.map((v,i)=>{
    const tag = i===activeFeature?'style="font-weight:500"':'';
    return `<div ${tag}>x[${i+1}] = ${fmt(v)}</div>`;
  }).join('');

  document.getElementById('v-enc').innerHTML =
    `<div>h[1] = ${fmt(enc[0])}</div><div>h[2] = ${fmt(enc[1])}</div>`+
    `<div style="margin-top:4px;font-size:11px;color:#7a7a7a">= μ·W${activeFeature+1} = ${mu.toFixed(2)}·(${W[activeFeature][0].toFixed(2)}, ${W[activeFeature][1].toFixed(2)})</div>`;

  document.getElementById('v-dec').innerHTML = dec.map((v,i)=>`<div>y[${i+1}] = ${fmt(v)}</div>`).join('');

  document.getElementById('v-out').innerHTML = out.map((v,i)=>{
    const isTarget = i===activeFeature;
    const hasErr = Math.abs(x[i]-v)>0.001;
    const cls = isTarget?(hasErr?'err':'perfect'):(v>0.001?'err':'');
    return `<div><span class="${cls}">f[${i+1}] = ${fmt(v)}</span>${isTarget?' ← target':(v>0.001?' leak!':'')}</div>`;
  }).join('');

  let errHtml = `<div style="font-size:15px;font-weight:500;margin-bottom:6px">‖x − f‖² = ${totalErr.toFixed(4)}</div>`;
  errs.forEach((e,i)=>{if(e>0.0001) errHtml+=`<div>feat ${i+1}: ${e.toFixed(4)}</div>`;});
  document.getElementById('v-err').innerHTML = errHtml;

  const c = configs[config];
  let explain = '';
  if (activeFeature>=c.k) explain='This feature has no weight vector — the network ignores it entirely.';
  else {
    const leaks = out.filter((v,i)=>i!==activeFeature&&v>0.001).length;
    if (leaks>0) explain=`Leaks into ${leaks} other feature(s) — weight columns aren't orthogonal. That's the cost of superposition.`;
    else explain='No leakage. Bias + ReLU suppressed all interference.';
  }
  document.getElementById('v-explain').textContent = explain;
  drawVectors(W, enc);
}

function drawVectors(W, enc) {
  const svg = document.getElementById('vec-svg');
  const cx=150,cy=150,scale=70;
  const gridC='rgba(0,0,0,0.08)', txtC='#7a7a7a';
  const colors=['#c45a3c','#2d5a7b','#5a8a5e','#c4933f','#8b6eae','#D4537E'];
  let html=`<circle cx="${cx}" cy="${cy}" r="${scale}" fill="none" stroke="${gridC}" stroke-width="0.5"/>`;
  html+=`<line x1="${cx-scale*1.5}" y1="${cy}" x2="${cx+scale*1.5}" y2="${cy}" stroke="${gridC}" stroke-width="0.5"/>`;
  html+=`<line x1="${cx}" y1="${cy-scale*1.5}" x2="${cx}" y2="${cy+scale*1.5}" stroke="${gridC}" stroke-width="0.5"/>`;
  W.forEach((w,i)=>{
    if(Math.abs(w[0])<0.01&&Math.abs(w[1])<0.01)return;
    const ex=cx+w[0]*scale,ey=cy-w[1]*scale;
    const isA=i===activeFeature, sw=isA?2.5:1.2, op=isA?1:0.5;
    html+=`<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="${colors[i]}" stroke-width="${sw}" opacity="${op}" stroke-linecap="round"/>`;
    html+=`<circle cx="${ex}" cy="${ey}" r="${isA?5:3}" fill="${colors[i]}" opacity="${op}"/>`;
    const lx=cx+w[0]*scale*1.2,ly=cy-w[1]*scale*1.2;
    html+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" fill="${txtC}" style="font:${isA?'600':'400'} 11px 'Source Sans 3'">${i+1}</text>`;
  });
  if(Math.abs(enc[0])>0.01||Math.abs(enc[1])>0.01){
    const hx=cx+enc[0]*scale,hy=cy-enc[1]*scale;
    html+=`<line x1="${cx}" y1="${cy}" x2="${hx}" y2="${hy}" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 3"/>`;
    html+=`<circle cx="${hx}" cy="${hy}" r="4" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>`;
    html+=`<text x="${hx+10}" y="${hy-6}" fill="${txtC}" style="font:400 10px 'Source Sans 3'">Wx</text>`;
  }
  svg.innerHTML = html;
}

function initBtns(){
  const cont=document.getElementById('feat-btns');
  for(let i=0;i<C;i++){
    const btn=document.createElement('button');
    btn.className='feat-btn'+(i===0?' active':'');
    btn.textContent=i+1;
    btn.onclick=()=>{activeFeature=i;cont.querySelectorAll('.feat-btn').forEach((b,j)=>b.classList.toggle('active',j===i));update();};
    cont.appendChild(btn);
  }
}

document.getElementById('mu-slider').oninput=function(){mu=this.value/100;document.getElementById('mu-val').textContent=mu.toFixed(2);update();};
document.getElementById('config-sel').onchange=function(){config=this.value;update();};

initBtns();
update();
</script>
</body></html>
