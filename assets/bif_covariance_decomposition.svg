<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Top: BIF definition -->
<rect x="100" y="30" width="480" height="60" rx="10" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="0.5"/>
<text x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="16" font-weight="500">BIF(zᵢ, ℓⱼ) = −Cov(ℓᵢ(w), ℓⱼ(w))</text>
<text x="340" y="74" text-anchor="middle" dominant-baseline="central" fill="rgb(83, 74, 183)" font-size="14">covariance over the posterior p(w|D)</text>

<!-- Annotation: what this means -->
<text x="340" y="112" text-anchor="middle" fill="rgb(61, 61, 58)" font-size="14">When the posterior spans two phases U and V...</text>

<!-- Arrow down to LoTC box -->
<line x1="340" y1="120" x2="340" y2="158" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>

<!-- Law of total covariance box -->
<rect x="60" y="163" width="560" height="56" rx="8" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)" stroke-width="0.5"/>
<text x="340" y="182" text-anchor="middle" dominant-baseline="central" fill="rgb(68, 68, 65)" font-size="16" font-weight="500">Law of total covariance</text>
<text x="340" y="204" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="14">Cov(ℓᵢ, ℓⱼ) = E[Cov(ℓᵢ, ℓⱼ | Z)]  +  Cov(E[ℓᵢ|Z], E[ℓⱼ|Z])</text>

<!-- Branching arrows -->
<line x1="230" y1="222" x2="190" y2="252" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>
<line x1="450" y1="222" x2="490" y2="252" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>

<!-- LEFT: Within-phase term -->
<rect x="30" y="257" width="300" height="115" rx="10" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)" stroke-width="0.5"/>
<text x="180" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="16" font-weight="500">Within-phase influence</text>
<text x="180" y="305" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="14">πU·CovU(ℓᵢ, ℓⱼ) + πV·CovV(ℓᵢ, ℓⱼ)</text>
<text x="180" y="332" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="14">"baseline" — what each phase</text>
<text x="180" y="354" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="14">contributes on its own</text>

<!-- RIGHT: Between-phase term -->
<rect x="350" y="257" width="300" height="115" rx="10" fill="rgb(250, 236, 231)" stroke="rgb(153, 60, 29)" stroke-width="0.5"/>
<text x="500" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(113, 43, 19)" font-size="16" font-weight="500">Between-phase influence</text>
<text x="500" y="305" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="14">πU·πV·(μᵢ,U−μᵢ,V)·(μⱼ,U−μⱼ,V)</text>
<text x="500" y="332" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="14">"transition spike" — arises because</text>
<text x="500" y="354" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="14">expected losses shift between phases</text>

<!-- Arrows down to consequence boxes -->
<line x1="180" y1="375" x2="180" y2="412" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>
<line x1="500" y1="375" x2="500" y2="412" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>

<!-- Sign flips box -->
<rect x="30" y="417" width="300" height="115" rx="8" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)" stroke-width="0.5"/>
<text x="180" y="442" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="16" font-weight="500">→ Sign flips</text>
<text x="180" y="468" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="14">CovU may be positive (priming)</text>
<text x="180" y="490" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="14">while CovV is negative (interference)</text>
<text x="180" y="512" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="14">as the dominant phase changes</text>

<!-- Peaks at transitions box -->
<rect x="350" y="417" width="300" height="115" rx="8" fill="rgb(250, 236, 231)" stroke="rgb(153, 60, 29)" stroke-width="0.5"/>
<text x="500" y="442" text-anchor="middle" dominant-baseline="central" fill="rgb(113, 43, 19)" font-size="16" font-weight="500">→ Peaks at transitions</text>
<text x="500" y="468" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="14">πU·πV is maximized at πU=πV=0.5</text>
<text x="500" y="490" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="14">= the critical point of the transition</text>
<text x="500" y="512" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="14">spike ∝ how much phases disagree</text>

<!-- Arrows down to insight box -->
<line x1="180" y1="535" x2="270" y2="582" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>
<line x1="500" y1="535" x2="410" y2="582" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>

<!-- Bottom: combined insight -->
<rect x="100" y="587" width="480" height="60" rx="10" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="0.5"/>
<text x="340" y="609" text-anchor="middle" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="16" font-weight="500">Influence is dynamic, not static</text>
<text x="340" y="631" text-anchor="middle" dominant-baseline="central" fill="rgb(83, 74, 183)" font-size="14">the same sample can prime or interfere depending on when</text>

</svg>
